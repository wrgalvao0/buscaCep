<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BUSCA CEP</title>
    <link rel="stylesheet" href="css/index.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="shortcut icon" href="img/geo-alt.svg" type="image/x-icon " />

  </head>

  <body>
    <div class="w-100 vh-100 d-flex justify-content-center align-items-center">
      <div class="card p-4 shadow-lg bg-body-tertiary rounded">
        <div class="d-flex flex-column">
          <div class="d-flex mb-3 justify-content-center align-items-center gap-2">
              <i class="bi bi-geo-alt icon"></i>
              <h1 class="text-center mb-0">BUSCA CEP</h1>
          </div>
          <form class="d-flex flex-column flex-md-row justify-content-center gap-3" action="">
            <input
              id="cep"
              type="text"
              placeholder="Digite o cep"
              class="w-100 form-control"
            />
            <div class="d-flex justify-content-center gap-2 flex-md-row">
              <button
                type="button"
                onclick="validarCep()"
                class="btn btn-primary"
              >
                Consultar
              </button>
              <button
                type="button"
                onclick="limparDados()"
                class="btn btn-secondary"
              >
                Limpar
              </button>
            </div>
          </form>
        </div>
        <div id="endereco" class="w-100 d-flex flex-column mt-3" style="display: none">
          <p>Logradouro: <span id="logradouro"></span></p>
          <p>Bairro: <span id="bairro"></span></p>
          <p>Complemento: <span id="complemento"></span></p>
          <p>Cidade: <span id="cidade"></span></p>
          <p>Estado: <span id="estado"></span></p>
        </div>
      </div>
    </div>
    <script src="js/utils.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
